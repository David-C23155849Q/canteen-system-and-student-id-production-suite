<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Print ID - {{ student.student_id }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; margin: 0; padding: 0; }
            .print-area { box-shadow: none !important; margin: 0 !important; }
            /* This force-colors the purple and green headers in the print */
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body class="bg-gray-900 min-h-screen flex flex-col items-center py-12">

    <div class="no-print w-full max-w-4xl flex justify-between items-center mb-12 px-6">
        <a href="{% url 'student_dashboard' %}" class="text-gray-400 hover:text-white flex items-center gap-2 transition-colors">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd" />
            </svg>
            Back to Student List
        </a>
        
        <div class="flex gap-4">
            <button onclick="window.print()" class="bg-purple-600 hover:bg-purple-700 text-white px-10 py-4 rounded-full font-black text-lg shadow-2xl transition-all hover:scale-105 active:scale-95 flex items-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" />
                </svg>
                PRINT ID CARD
            </button>
        </div>
    </div>

    <div class="print-area flex flex-col gap-8 items-center">
        <div class="bg-white p-1 rounded-lg shadow-2xl overflow-hidden">
            <img src="/media/student_ids_purple_final/{{ student.student_id }}_FRONT.png" 
                 alt="Front ID"
                 class="w-[600px] h-auto block border border-gray-100">
        </div>
        
        <div class="bg-white p-1 rounded-lg shadow-2xl overflow-hidden">
            <img src="/media/student_ids_purple_final/{{ student.student_id }}_BACK.png" 
                 alt="Back ID"
                 class="w-[600px] h-auto block border border-gray-100">
        </div>
    </div>

    <div class="no-print mt-12 text-center max-w-lg">
        <p class="text-purple-300 font-bold mb-2">Printing for Morgenster PVC Cards:</p>
        <ul class="text-gray-400 text-sm space-y-1 italic text-left list-disc list-inside">
            <li>Set <strong>Margins</strong> to "None".</li>
            <li>Set <strong>Scale</strong> to "Default" or "100%".</li>
            <li>Ensure <strong>Background Graphics</strong> is checked.</li>
        </ul>
    </div>

</body>
</html>
