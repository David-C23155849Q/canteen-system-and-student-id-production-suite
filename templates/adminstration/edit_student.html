<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="bg-purple-900 p-6 text-white">
            <h2 class="text-2xl font-bold">Edit Student Record</h2>
            <p class="text-purple-200 text-sm">Modifying profiles for Morgenster Teachers College</p>
        </div>

        <form method="POST" enctype="multipart/form-data" class="p-8 space-y-6">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                <input type="text" name="full_name" value="{{ student.full_name }}" 
                       class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Registration Number</label>
                    <input type="text" name="student_id" value="{{ student.student_id }}" 
                           class="w-full p-3 border rounded-lg bg-gray-50 text-gray-600 focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Intake</label>
                    <input type="text" name="student_intake" value="{{ student.student_intake }}" 
                           class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-purple-500 outline-none">
                </div>
            </div>

            <div class="flex items-center gap-6 p-4 bg-purple-50/50 rounded-xl border border-purple-100">
                {% if student.photo %}
                    <img src="{{ student.photo.url }}" class="w-24 h-24 rounded-full object-cover border-4 border-white shadow-md">
                {% else %}
                    <div class="w-24 h-24 rounded-full bg-gray-200 flex items-center justify-center text-gray-400 font-bold text-xs text-center p-2">No Photo</div>
                {% endif %}
                <div class="flex-1">
                    <label class="block text-sm font-bold text-gray-700 mb-1">Update Photo</label>
                    <input type="file" name="photo" class="text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-700 file:text-white hover:file:bg-purple-900 cursor-pointer">
                </div>
            </div>

            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 pt-6 border-t border-gray-100">
                <a href="{% url 'student_dashboard' %}" class="text-gray-400 font-semibold hover:text-gray-600 transition">
                    Cancel & Go Back
                </a>
                
                <div class="flex gap-3 w-full sm:w-auto">
                    <button type="submit" name="save_only" 
                            class="flex-1 bg-white border border-gray-300 text-gray-700 px-6 py-3 rounded-xl font-bold hover:bg-gray-50 transition shadow-sm text-sm">
                        Save Details
                    </button>
            
                    <button type="submit" name="save_regenerate" 
                            class="flex-1 bg-purple-700 text-white px-8 py-3 rounded-xl font-bold hover:bg-purple-900 shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 text-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                        </svg>
                        Save & Update ID Card
                    </button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
